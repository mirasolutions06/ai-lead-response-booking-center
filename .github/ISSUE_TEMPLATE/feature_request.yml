name: Feature request
description: Suggest an idea or improvement for the AI Lead Response & Booking Control Center
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: Thanks for suggesting an improvement. Please describe the problem before the solution.
  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem are you trying to solve? Why does it matter?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe what you'd like to happen.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative approaches or workarounds you've thought about.
    validations:
      required: false
